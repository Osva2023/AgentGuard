<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentGuard Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #7c6bff;
      --accent2:  #5a4de0;
      --text:     #e0e0e0;
      --muted:    #888;
      --critical: #ff4f4f;
      --high:     #ff8c42;
      --warn:     #ffd166;
      --safe:     #06d6a0;
      --approved: #06d6a0;
      --blocked:  #ff4f4f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo-shield { font-size: 20px; }

    .clock {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    /* ── main layout ── */
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── stats bar ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .stat-card.sessions  .stat-value { color: var(--accent); }
    .stat-card.intercept .stat-value { color: var(--warn); }
    .stat-card.blocked   .stat-value { color: var(--blocked); }
    .stat-card.approved  .stat-value { color: var(--approved); }

    /* ── section heading ── */
    .section-heading {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── sessions table ── */
    .sessions-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 100px 90px 1fr 100px 80px 80px 80px;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .session-row {
      display: grid;
      grid-template-columns: 100px 90px 1fr 100px 80px 80px 80px;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }

    .session-row:last-child { border-bottom: none; }
    .session-row:hover { background: rgba(124,107,255,0.08); }
    .session-row.expanded { background: rgba(124,107,255,0.12); border-bottom: none; }

    .session-id { color: var(--accent); font-size: 12px; }
    .session-agent { color: var(--text); }
    .session-time { color: var(--muted); font-size: 11px; }
    .session-duration { color: var(--muted); text-align: right; }
    .session-intercept { color: var(--warn); text-align: right; }
    .session-blocked { color: var(--blocked); text-align: right; }
    .session-approved { color: var(--approved); text-align: right; }

    /* ── expanded event list ── */
    .events-panel {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
    }

    .events-panel.open { display: block; }

    .events-panel-heading {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .event-item {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 12px;
      align-items: baseline;
    }

    .event-item:last-child { border-bottom: none; }

    .event-ts { color: var(--muted); flex-shrink: 0; width: 90px; font-size: 11px; }
    .event-type { flex-shrink: 0; width: 170px; }
    .event-detail { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .event-type.session_start   { color: var(--accent); }
    .event-type.session_end     { color: var(--muted); }
    .event-type.command_intercepted { color: var(--warn); }
    .event-type.command_approved    { color: var(--approved); }
    .event-type.command_denied      { color: var(--blocked); }
    .event-type.snapshot_created    { color: #4fc3f7; }

    .level-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      margin-left: 4px;
    }

    .level-CRITICAL { background: var(--critical); color: #fff; }
    .level-HIGH     { background: var(--high); color: #111; }
    .level-WARN     { background: var(--warn); color: #111; }

    /* ── empty state ── */
    .empty-state {
      padding: 48px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .big { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    /* ── refresh indicator ── */
    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--safe);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .refresh-label { color: var(--muted); font-size: 11px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-shield">🛡</span>
    AgentGuard
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="refresh-label"><span class="refresh-dot"></span>auto-refresh 5s</span>
    <span class="clock" id="clock"></span>
  </div>
</header>

<main>
  <!-- Stats bar -->
  <div class="stats-grid">
    <div class="stat-card sessions">
      <div class="stat-label">Sessions</div>
      <div class="stat-value" id="stat-sessions">—</div>
    </div>
    <div class="stat-card intercept">
      <div class="stat-label">Intercepted</div>
      <div class="stat-value" id="stat-intercepted">—</div>
    </div>
    <div class="stat-card blocked">
      <div class="stat-label">Blocked</div>
      <div class="stat-value" id="stat-blocked">—</div>
    </div>
    <div class="stat-card approved">
      <div class="stat-label">Approved</div>
      <div class="stat-value" id="stat-approved">—</div>
    </div>
  </div>

  <!-- Sessions table -->
  <div class="section-heading">Sessions</div>
  <div class="sessions-table" id="sessions-table">
    <div class="empty-state">
      <div class="big">📋</div>
      <p>No sessions yet — start an agent with <code>agentguard &lt;agent&gt;</code></p>
    </div>
  </div>
</main>

<script>
  // ── clock ────────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── helpers ──────────────────────────────────────────────────────────────────
  function shortId(id) {
    return id ? id.slice(0, 8) : "—";
  }

  function fmtTime(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function fmtDuration(startTs, endTs) {
    if (!startTs) return "—";
    const ms = (endTs ? new Date(endTs) : new Date()) - new Date(startTs);
    if (ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60);
    return m + "m " + (s % 60) + "s";
  }

  function eventLabel(type) {
    return {
      session_start:       "session_start",
      session_end:         "session_end",
      command_intercepted: "command_intercepted",
      command_approved:    "command_approved",
      command_denied:      "command_denied",
      snapshot_created:    "snapshot_created",
    }[type] || type;
  }

  // ── fetch helpers ─────────────────────────────────────────────────────────────
  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.statusText);
    return res.json();
  }

  // ── session expansion ─────────────────────────────────────────────────────────
  const expandedSessions = new Set();

  async function toggleSession(id) {
    const panel = document.getElementById("panel-" + id);
    const row   = document.getElementById("row-" + id);
    if (!panel) return;

    if (panel.classList.contains("open")) {
      panel.classList.remove("open");
      row.classList.remove("expanded");
      expandedSessions.delete(id);
    } else {
      panel.classList.add("open");
      row.classList.add("expanded");
      expandedSessions.add(id);
      await loadSessionEvents(id);
    }
  }

  async function loadSessionEvents(id) {
    const panel = document.getElementById("panel-" + id);
    if (!panel) return;
    try {
      const session = await fetchJson("/api/sessions/" + id);
      const events = session.events || [];
      if (events.length === 0) {
        panel.innerHTML = '<div class="events-panel-heading">No events</div>';
        return;
      }
      const rows = events.map((e) => {
        const levelBadge = e.level
          ? `<span class="level-badge level-${e.level}">${e.level}</span>`
          : "";
        const detail = e.command
          ? `<span class="event-detail">${escHtml(e.command)}</span>${levelBadge}`
          : (e.stashRef ? `<span class="event-detail">${escHtml(e.stashRef)}</span>` : "");
        return `<div class="event-item">
          <span class="event-ts">${fmtTime(e.ts)}</span>
          <span class="event-type ${e.event || ""}">${eventLabel(e.event)}</span>
          ${detail}
        </div>`;
      }).join("");
      panel.innerHTML = '<div class="events-panel-heading">Events</div>' + rows;
    } catch (err) {
      panel.innerHTML = `<div class="events-panel-heading" style="color:var(--blocked)">Failed to load: ${escHtml(err.message)}</div>`;
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── render ────────────────────────────────────────────────────────────────────
  function renderSessions(sessions) {
    const table = document.getElementById("sessions-table");

    if (!sessions || sessions.length === 0) {
      table.innerHTML = `<div class="empty-state">
        <div class="big">📋</div>
        <p>No sessions yet — start an agent with <code>agentguard &lt;agent&gt;</code></p>
      </div>`;
      return;
    }

    const header = `<div class="table-header">
      <span>Session</span>
      <span>Agent</span>
      <span>Started</span>
      <span style="text-align:right">Duration</span>
      <span style="text-align:right">Intercepted</span>
      <span style="text-align:right">Blocked</span>
      <span style="text-align:right">Approved</span>
    </div>`;

    const rows = sessions.map((s) => {
      const isExpanded = expandedSessions.has(s.sessionId);
      return `
        <div class="session-row ${isExpanded ? "expanded" : ""}" id="row-${escHtml(s.sessionId)}"
             onclick="toggleSession('${escHtml(s.sessionId)}')">
          <span class="session-id">${shortId(s.sessionId)}</span>
          <span class="session-agent">${escHtml(s.agent || "—")}</span>
          <span class="session-time">${fmtTime(s.startTime)}</span>
          <span class="session-duration">${fmtDuration(s.startTime, s.endTime)}</span>
          <span class="session-intercept">${s.intercepted}</span>
          <span class="session-blocked">${s.blocked}</span>
          <span class="session-approved">${s.approved}</span>
        </div>
        <div class="events-panel ${isExpanded ? "open" : ""}" id="panel-${escHtml(s.sessionId)}">
          <div class="events-panel-heading" style="color:var(--muted)">Click to load events…</div>
        </div>`;
    }).join("");

    table.innerHTML = header + rows;

    // Reload events for any previously-expanded sessions
    for (const id of expandedSessions) {
      loadSessionEvents(id);
    }
  }

  function renderStats(stats) {
    document.getElementById("stat-sessions").textContent    = stats.totalSessions    ?? "—";
    document.getElementById("stat-intercepted").textContent = stats.totalIntercepted ?? "—";
    document.getElementById("stat-blocked").textContent     = stats.totalBlocked     ?? "—";
    document.getElementById("stat-approved").textContent    = stats.totalApproved    ?? "—";
  }

  // ── polling ───────────────────────────────────────────────────────────────────
  async function refresh() {
    try {
      const [stats, sessions] = await Promise.all([
        fetchJson("/api/stats"),
        fetchJson("/api/sessions"),
      ]);
      renderStats(stats);
      renderSessions(sessions);
    } catch (err) {
      console.warn("Dashboard refresh failed:", err.message);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
